# nightly-b.yml — Job B: the publish-and-monitor run (plan §2.1, Appendix C).
#
# Cron 25 0 * * 2-6 UTC = 8:25pm EDT / 7:25pm EST. This cron matches the healthchecks.io check, so
# Job B OWNS the dead-man switch: every scheduled night it must feed the check, or an alert fires.
#
# Job B pings /start, does its work, and pings success — the dead-man switch is live from day one.
# The pings live inside jobs/job_b.py (unit-testable with a mock transport); the workflow only runs
# the job. From P1 the Friday-evening run also takes a pg_dump of the serving database and pushes it
# to R2, so postgresql-client-17 is installed for pg_dump. The full briefing pipeline and the
# monthly Stooq spot-check attach here in P3.

name: nightly-b

# The control room's "Re-run the evening briefing" button dispatches this. Job B has no modes — its
# whole job IS the evening assembly — so it takes only the request id, and for the same reason
# nightly-a does: the dispatch API returns 204 with an empty body, so the run id has to be recovered
# by matching this name. See the long note in nightly-a.yml.
run-name: nightly-b · ${{ inputs.request_id || 'cron' }}

on:
  schedule:
    - cron: "25 0 * * 2-6"
  workflow_dispatch:
    inputs:
      request_id:
        description: "The control room's request id (leave blank for a hand-run from this tab)"
        type: string
        required: false
        default: ""

concurrency:
  group: msm-nightly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen

      # pg_dump for the weekly backup — the client major version must be >= the Supabase server,
      # which Supabase upgraded to Postgres 17 (pg_dump refuses to dump a newer server than itself).
      - name: Install postgresql-client-17
        working-directory: .
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # The runner ships a v16 client whose binaries shadow the new v17 on PATH; put v17 first,
          # or pg_dump still resolves to 16 and aborts on the version mismatch (the server is 17).
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run Job B
        env:
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # THE EVENING BRIEFING'S LLM STAGES. Job B collects the extraction batch Job A submitted
          # and synthesises the brief — and it has been doing neither, because this key was never
          # passed to it. It has existed in GitHub since 2026-07-10; the pipeline degrades quietly
          # without it, so the brief has been assembling without its extraction since P3 and nobody
          # was told. Found by the N0 audit (NEWS-AND-CONTROL-PLAN, provisioning row P-3).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_EXTRACT: ${{ secrets.MODEL_EXTRACT }}
          MODEL_SYNTH: ${{ secrets.MODEL_SYNTH }}
          # The briefing's revalidation of the cached Desk payload, after it publishes.
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # The weekly pg_dump uses the session pooler (pg_dump needs a session, not the txn pooler).
          SESSION_POOLER_URL: ${{ secrets.SESSION_POOLER_URL }}
          # The backup lands in R2 under backups/.
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: uv run python -m jobs.job_b
