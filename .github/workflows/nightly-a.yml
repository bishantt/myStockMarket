# nightly-a.yml — Job A: the after-close ingest-and-compute run (plan §2.1, Appendix C).
#
# Cron 37 22 * * 1-5 UTC = 6:37pm EDT / 5:37pm EST, weekdays, after the US close. The schedule is
# UTC-fixed on purpose: it sits after the close in both DST regimes, so the cron is never edited —
# only the user's wall-clock reading of it shifts with the season.
#
# Job A lists the universe, ingests EOD bars, computes indicators + scans, reads the macro context,
# and publishes the served slice to Postgres (the flow lives in nightly.py). It does NOT touch
# healthchecks.io; its failures surface as GitHub's own failure e-mails via a non-zero exit. The
# dead-man check belongs to Job B (nightly-b.yml), whose cron matches it.
#
# THE SECOND CRON, AND WHY IT EXISTS (NEWS-AND-CONTROL-PLAN §3.1).
#
# FRED publishes the index closes AFTER this job has already run. Verified against FRED's own update
# stamps: the Dow lands ~6:03pm ET, the S&P ~8:01pm, and the Nasdaq Composite ~11:38pm — against
# this job at 6:37pm and Job B at 8:25pm. So the index levels stored by the night are STRUCTURALLY
# one session behind by the time the user reads the Desk over coffee. Retrying cannot fix it; the
# data does not exist yet.
#
# So there is a second run at dawn (`0 10 * * 2-6` UTC = 6:00am EDT / 5:00am EST, Tue–Sat so that
# Saturday catches Friday's close). It runs in `macro` mode: it re-reads FRED, updates the previous
# session's three index levels and two context cells, revalidates, and touches NOTHING else — no
# bars, no scans, no news, no LLM spend. By the pre-open read, every index level is the real prior
# close.

name: nightly-a

# THE RUN NAME IS LOAD-BEARING. It is not decoration for the Actions tab.
#
# The control room (N6) dispatches this workflow and then has to find the run it just created, so it
# can show the reader "running…", "succeeded" or "failed". The obvious way would be for the dispatch
# API to tell us the run id — and the plan said it did, and GitHub's own REST docs say it does.
#
# BOTH ARE WRONG. Recorded against the live API on 2026-07-13:
#
#     POST /repos/{owner}/{repo}/actions/workflows/nightly-a.yml/dispatches
#     -> HTTP 204 No Content. Empty body. No workflow_run_id. No run_url.
#
# There is no run id in the response, and no `return_run_details` parameter to ask for one. So the id
# must be RECOVERED rather than received: the app stamps each request with a `request_id`, this line
# prints it into the run's name, and the app finds its run by matching that id in the runs list
# (`display_title` is the run-name when one is set).
#
# Which means: DELETE THIS LINE AND THE CONTROL ROOM GOES BLIND. Every button would dispatch a real
# run and then report "we can't find it" forever — a run that fired and a run that never fired would
# look identical from the couch. There is a test asserting this line carries `request_id`.
run-name: nightly-a · ${{ inputs.mode || 'scheduled' }} · ${{ inputs.request_id || 'cron' }}

on:
  schedule:
    # The full nightly, after the US close.
    - cron: "37 22 * * 1-5"
    # The dawn macro refresh — see the note above. Tue–Sat catches Friday's close on Saturday.
    - cron: "0 10 * * 2-6"
  # A hand-dispatched run picks its own mode. N6's control room dispatches this workflow with one of
  # these values, and the panel's copy promises what each will and will not touch — MODE_STAGES in
  # jobs/job_a.py is the pinned constant those promises are made of, with a test holding it.
  #
  # The default stays `full`, so the Actions-tab "Run workflow" button behaves as it always has.
  workflow_dispatch:
    inputs:
      mode:
        description: "What this run should do"
        type: choice
        default: full
        options:
          - full      # the whole night: ingest, compute, scan, catalysts, news, publish
          - news      # rebuild the front page only — touches no price, no scan, no base rate
          - macro     # re-read the rates, gold, FX and the gauge inputs
          - compute   # recompute indicators/scans/analytics over STORED bars — fetches nothing
      request_id:
        description: "The control room's request id (leave blank for a hand-run from this tab)"
        type: string
        required: false
        default: ""

# One nightly run at a time. Job A and Job B share this group so they never overlap.
concurrency:
  group: msm-nightly
  cancel-in-progress: false

permissions:
  contents: write # for the heartbeat commit below

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen

      # Which mode this run is. The dawn cron runs `macro` (three numbers, nothing else); every
      # other trigger — the after-close cron, or a hand-dispatch from the Actions tab — runs the
      # full night. GitHub tells us which schedule fired via `github.event.schedule`.
      #
      # The job itself refuses an unrecognised mode rather than falling back to "full" (see
      # parse_mode), so a typo here cannot silently turn a 6am three-number refresh into a whole
      # market ingest at dawn.
      - name: Pick the run mode
        id: mode
        run: |
          if [ -n "${{ inputs.mode }}" ]; then
            # A hand dispatch (the Actions tab, or N6's control room) said what it wanted.
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 10 * * 2-6" ]; then
            echo "value=macro" >> "$GITHUB_OUTPUT"
          else
            echo "value=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Job A (${{ steps.mode.outputs.value }})
        env:
          # The serving database (Supabase transaction pooler).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # EOD bars + the universe.
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          # The macro strip (VIXCLS + DGS10) and the FRED release calendar.
          FRED_KEY: ${{ secrets.FRED_KEY }}
          # The catalyst layer: per-ticker news, market-wide news, and the earnings calendar.
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          # The macro board's gold cell. The secret landed on 2026-07-13 (provisioning row P-5) and
          # the gold cell STILL would not have filled, because a secret that exists in GitHub and is
          # never passed to the job does not exist as far as the job is concerned. That is the exact
          # shape of the ANTHROPIC_API_KEY bug two rows down, which hid for four phases. The guard
          # that now makes this class of mistake fail loudly is tests/test_workflow_env.py.
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          # The Parquet history lake on Cloudflare R2.
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # THE EXTRACTION BATCH. This key existed in GitHub since 2026-07-10 and was passed to
          # NEITHER nightly job — and the pipeline is written to degrade quietly without it, so it
          # printed "skipping the extraction batch" and carried on. Every LLM stage had therefore
          # been silently skipping in production since P3, and the evening brief was assembling
          # without the stage that reads the articles. Found by the N0 audit; this is the fix.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_EXTRACT: ${{ secrets.MODEL_EXTRACT }}
          MODEL_SYNTH: ${{ secrets.MODEL_SYNTH }}
          # After publishing, ask the app to revalidate its cached Desk payload.
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: uv run python -m jobs.job_a --mode ${{ steps.mode.outputs.value }}

      # A private repo's scheduled workflows are disabled by GitHub after 60 days without repo
      # activity. An empty heartbeat commit each night keeps the schedule alive.
      #
      # Only the full nightly heartbeats. The dawn macro run would otherwise double the commit rate
      # for no added liveness — one commit a night is what the 60-day timer needs.
      - name: Heartbeat
        if: steps.mode.outputs.value == 'full'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: heartbeat"
          git push
