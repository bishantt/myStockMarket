# drill.yml — TEMPORARY, for the P0 healthchecks down-drill only.
#
# The dead-man-switch drill needs the healthchecks ping URL and read-only API key, which live in
# GitHub secrets (not locally), so the drill runs here where the secrets are available. This
# workflow is deleted once the drill is recorded; it is not one of the four contract workflows
# in Appendix C.

name: drill

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "start | status | recover"
        required: true
        default: "status"

jobs:
  drill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Run drill step
        env:
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
          HEALTHCHECKS_API_KEY: ${{ secrets.HEALTHCHECKS_API_KEY }}
          MODE: ${{ inputs.mode }}
        run: uv run python -m scripts.healthchecks_drill "$MODE"
