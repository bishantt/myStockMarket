# ci.yml — the checks that gate every push (plan §6.1, §6.4, Appendix C).
#
# WHAT RUNS WHERE (rewritten at G0, 2026-07-13, to describe reality — the old header did not):
#
# - Branch pushes, including main: the `app` job (typecheck, lint, drift, unit tests, build, and the
#   route/bundle/font budgets) and the `pipeline` job (pytest). This is the everyday proof, and it
#   is where a commit earns its green.
#
# - Phase-exit tags: ONLY the `e2e` job — the browser oracle (Playwright + axe + visual regression
#   + PWA), which needs a browser, a seeded database, and a full build. The app and pipeline jobs
#   deliberately SIT OUT tag runs: a tag points at a SHA that already ran them green on main minutes
#   earlier, and re-running them there was ~43% of this repo's entire CI bill for no new information
#   (GATE-EFFICIENCY-ANALYSIS.md §2.3-#5). The oracle is the only thing a tag adds, so it is the
#   only thing a tag runs.
#
# - `gh workflow run ci.yml -f job=e2e` (the REHEARSAL, new at G1): the browser oracle again, run by
#   hand on any ref you name — normally main's HEAD, the exact SHA you are about to tag. This is the
#   whole point of G1. The oracle used to run for the FIRST time on the tag, which made the tag the
#   first real test: 52% of tag runs failed, and each failure meant deleting the tag, fixing, and
#   pushing it again (GATE-EFFICIENCY-ANALYSIS.md §2.3-#1). Now you rehearse the identical suite on
#   the identical SHA before the tag exists, so the tag run is a formality that should be green on the
#   first try. Same jobs, same shards, same pixels; only the trigger differs.
#
# - `gh workflow run ci.yml -f job=vrt-baselines`: the manual baseline mint, for a restyle you KNOW
#   moved pixels and want to re-baseline before rehearsing. A rehearsal that reds on pixels also
#   mints candidates by itself (see the auto-mint step in the e2e job), so this dispatch is now the
#   deliberate-restyle path, not the only path.
#
# LIGHTHOUSE DOES NOT RUN HERE, and never has. The old header claimed it ran "on the phase-exit
# tags"; no Lighthouse job has ever existed in any workflow in this repo's history. Lighthouse runs
# locally against the live Vercel deployment via `npm run check:lighthouse` (gate step 7). A false
# sentence inside the gate's own definition file is precisely the disease the next paragraph warns
# about, so it is gone.
#
# THE TAG LIST BELOW AND THE `if:` ON THE e2e JOB MUST BE KEPT IN STEP. A tag family that appears in
# one but not the other is a gate that silently never runs — either the tag starts nothing at all,
# or it starts a run whose green proved nothing because the oracle sat it out. This is no longer an
# honour system: `pipeline/tests/test_ci_tag_families.py` reads this file and fails when they drift.
# The families: phase-* (the build phases) · redesign-* (the UI redesign) · feel-* (app-feel) ·
# nc-* (news & control) · gate-* (this efficiency reform) · pd-* (polish & depth, wired ahead of PD0).
#
# Red CI blocks a phase exit — no exceptions (plan §6.4).

name: ci

# One live run per ref AND PER PURPOSE. A re-pushed tag, or a main push that supersedes another,
# kills its predecessor the moment it starts. Before G0 nothing cancelled anything: nc-final's
# endgame burned a 785-second run and a 229-second run on tags that had already been superseded, and
# a 13-minute zombie once had to be cancelled by hand. Branch refs and tag refs are distinct groups,
# so tagging a commit never cancels that commit's own main run.
#
# `github.event_name` IS PART OF THE GROUP, and that is not decoration — it was measured (G1). G0
# grouped on the ref alone, which was correct until the rehearsal existed and fatal the moment it
# did: a rehearsal dispatched on main carries `github.ref == refs/heads/main`, the very same ref as
# main's own push run. On 2026-07-13 the first rehearsal ever dispatched cancelled the push run of
# the commit it was rehearsing (run 29291818293, cancelled by run 29291878002) — and the reverse is
# worse: pushing a docs commit during a 9-minute rehearsal would have killed the rehearsal, leaving
# an exit with no oracle at all and nothing saying so. The exit ritual runs the branch push and the
# rehearsal deliberately in PARALLEL, so these two must be able to coexist. Splitting the group by
# event keeps every supersede-cancel that G0 bought and lets the two live side by side.
concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["**"]
    tags: ["phase-*", "redesign-*", "feel-*", "nc-*", "gate-*", "pd-*"]
  workflow_dispatch:
    inputs:
      job:
        description: "Which manual job to run"
        required: true
        default: e2e
        type: choice
        options:
          # The rehearsal: the full browser oracle on a ref of your choosing, before any tag exists.
          - e2e
          # The deliberate baseline mint, for a restyle you already know moved pixels.
          - vrt-baselines

jobs:
  app:
    name: app — typecheck, lint, drift, unit, build
    # Branch pushes only. A tag points at a SHA this job already passed on main; re-running it there
    # proved nothing and cost ~208 billed minutes across this build. A workflow_dispatch (the
    # baseline mint) never needed it either. See the header.
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint

      # The 20 anti-drift rules — a one-second grep that, until G0, ran in NO CI workflow at all.
      # It was local discipline only: if a session forgot gate step 5, nothing mechanical noticed
      # (GATE-EFFICIENCY-ANALYSIS.md §4.8). The local step stays; this is the backstop for the
      # forgotten one.
      - name: Anti-drift rules (gate step 5 — was local-only until G0)
        run: npm run check:drift

      - run: npm test

      # The production build uses webpack, because Serwist's service-worker injection is a webpack
      # plugin and Next 16 defaults to Turbopack (see next.config.ts). `npm run build` already
      # carries the --webpack flag.
      #
      # THIS JOB BUILDS WITH NO DATABASE, ON PURPOSE, AND THE BUILD MUST SURVIVE IT. Since F1 every
      # read route prerenders, which means every page's database reads now run at BUILD time, not
      # only at request time — the old comment here ("env values are read at request time, not at
      # build time") stopped being true the moment the routes were cached. Every one of those loaders
      # is wrapped to catch an unreachable database and degrade to its honest empty state, so a
      # DB-less build produces empty-but-valid prerenders and still type-checks and compiles.
      #
      # That is exactly what we want this job to prove. The e2e job below seeds a real Postgres
      # before it builds, so the SEEDED prerenders get their own coverage there, and Vercel's
      # production build has DATABASE_URL and renders the real morning. Three builds, three honest
      # answers, no secrets needed here.
      - run: npm run build

      - name: Route budget B1 — every product route is served from a cache (APP-FEEL-PLAN §5.4)
        run: npm run check:routes

      - name: Bundle budget B4 — per-route first-load JS
        run: npm run check:bundles

      - name: Font budget (plan §4.5)
        run: npm run check:fonts

  pipeline:
    name: pipeline — pytest
    # Branch pushes only, for the same reason as the app job above.
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # A throwaway Postgres for the publish integration tests (plan §6.1). The rest of the suite
    # uses recorded fixtures and mock transports — never a live key. TEST_DATABASE_URL below points
    # the DB tests at this service; without it (locally, no Docker) they skip loudly.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: msmtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Cache the resolved wheels across runs. uv was uncached for ~300 runs.
          enable-cache: true
          cache-dependency-glob: pipeline/uv.lock

      - run: uv sync --frozen

      # pg_dump / pg_restore for the backup round-trip test (major version must match the service).
      - name: Install postgresql-client-16
        working-directory: .
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: pytest
        env:
          TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/msmtest
        run: uv run pytest -q

  e2e:
    name: oracle (${{ matrix.project }}) — e2e + VRT + PWA + axe
    # TWO ways in, and they run the identical suite:
    #
    #   1. A phase-exit tag. Keep the families here in step with `on.push.tags` above —
    #      test_ci_tag_families.py reads this line and fails the build if the two ever drift apart.
    #
    #   2. `gh workflow run ci.yml -f job=e2e [--ref <ref>]` — the REHEARSAL (G1). The same oracle,
    #      on demand, on a SHA that has no tag on it yet. Because it is the same job and not a copy
    #      of it, a rehearsal cannot pass while the tag run fails: there is one oracle, invoked twice.
    #      Dispatching by ref is also how you prove a change on a scratch branch without merging it.
    #
    # GitHub validates dispatch inputs against the workflow file ON THE TARGET REF, so `job=e2e` is
    # only an accepted value once this line is on the ref you are dispatching. Push first, then
    # dispatch; a 422 here means the ref does not know about the input yet.
    if: startsWith(github.ref, 'refs/tags/phase-') || startsWith(github.ref, 'refs/tags/redesign-') || startsWith(github.ref, 'refs/tags/feel-') || startsWith(github.ref, 'refs/tags/nc-') || startsWith(github.ref, 'refs/tags/gate-') || startsWith(github.ref, 'refs/tags/pd-') || (github.event_name == 'workflow_dispatch' && inputs.job == 'e2e')
    runs-on: ubuntu-latest

    # THREE LEGS, ONE PER PLAYWRIGHT PROJECT (G1). The suite used to run all three projects inside a
    # single job, one worker, strictly serial: 852–868 seconds of the tag run's 950, and it was 90% of
    # every exit's wall-clock.
    #
    # `workers: 1` in playwright.config.ts is NOT the enemy and is NOT touched. It exists for a real
    # reason: the seeded journeys write to the database (watchlist adds), so two specs running at once
    # would let one spec's write change what another spec reads. That reason is about sharing ONE
    # database — and each matrix leg is a separate runner with its own Postgres service container, so
    # three legs are three throwaway databases that cannot see each other. The serial-within-a-leg
    # guarantee survives byte for byte; only the legs run at the same time.
    #
    # `fail-fast: false` because a red desktop leg must not cancel the phone leg. At a phase exit you
    # want the WHOLE truth in one run — all the failures, not the first one. Cancelling the other legs
    # would just buy another 9-minute round trip to learn what this run already knew.
    #
    # `wide` is the short leg by construction: playwright.config.ts scopes it to vrt+hardening
    # (testMatch), so it shoots the wide grid and sweeps for sideways scroll and stops.
    strategy:
      fail-fast: false
      matrix:
        project: [desktop, phone, wide]

    # A throwaway Postgres, seeded with the deterministic synthetic morning (prisma/seed.mjs), so
    # the Desk data journey (desk.spec.ts) asserts real rendered values end to end. This is a TEST
    # database only — the seed refuses to touch a Supabase host, so production is never involved.
    # One of these per leg: three legs, three databases, no shared state between them.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: msmtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Both URLs point at the service container: the app runtime reads DATABASE_URL, Prisma Migrate
      # reads DIRECT_URL. MSM_SEEDED flips the guarded Desk journey on (it skips without it).
      DATABASE_URL: postgresql://postgres:test@localhost:5432/msmtest
      DIRECT_URL: postgresql://postgres:test@localhost:5432/msmtest
      MSM_SEEDED: "1"
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      # Bring the test database up to the current schema, then load the synthetic morning. The app's
      # webServer (started by Playwright) reads DATABASE_URL from this job's env and serves it.
      - name: Migrate and seed the test database
        run: |
          npx prisma migrate deploy
          npm run db:seed

      # Chromium is ~150 MB and was re-downloaded on every single browser run. The install step below
      # stays exactly as it was — with the cache warm it finds the binary already there and becomes a
      # fast no-op, and `--with-deps` still installs the OS libraries, which are not cached. The key
      # is the lockfile, so bumping Playwright's version invalidates it automatically.
      - name: Cache the Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The webServer in playwright.config.ts builds and starts the app with fixture auth
      # credentials; the database URLs above come from the job env, so this needs no secrets.
      #
      # `--project` is the ONLY thing the matrix changes about the run. playwright.config.ts is not
      # edited and does not know it is being sharded: the projects it already declares (desktop,
      # phone, wide) are the shards, and each leg simply runs one of them.
      - name: The oracle (${{ matrix.project }})
        run: npm run e2e -- --project=${{ matrix.project }}

      # A failed visual-regression check is only useful if you can SEE what changed — and for six
      # phases this uploaded a directory that does not exist. CI runs the `github` reporter, not the
      # `html` one, so app/playwright-report/ is never written; the artifact came back empty every
      # time, which meant the one thing a VRT failure owes you (the picture) was the one thing you
      # could not get. `test-results/` is where Playwright actually writes the expected/actual/diff
      # triptych, and it has been there all along.
      #
      # Named per leg: artifact names are unique within a run, so three legs uploading
      # `playwright-failures` would collide.
      - name: Upload the failure artifacts (the expected/actual/diff images live here)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures-${{ matrix.project }}
          path: |
            app/test-results/
            app/playwright-report/
          retention-days: 14
          if-no-files-found: warn

  vrt-baselines:
    name: VRT — generate baselines (manual; CI is the pixel oracle)
    # Baselines are generated HERE, never on a developer's machine. Linux and macOS rasterise fonts
    # differently, so a macOS baseline fails in CI on antialiasing alone, and maintaining two sets
    # for one developer is pure cost (Appendix E-7). Run this by hand when a phase intentionally
    # changes what the app looks like:
    #
    #     gh workflow run ci.yml -f job=vrt-baselines
    #
    # then download the artifact and commit the .png files it contains, with the reason in the
    # commit body ("VRT: N baselines updated — <why>"). An UNEXPLAINED diff is a build failure;
    # an explained one is a commit. That distinction is the whole discipline (§9.3).
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'vrt-baselines'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: msmtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/msmtest
      DIRECT_URL: postgresql://postgres:test@localhost:5432/msmtest
      MSM_SEEDED: "1"
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Migrate and seed the test database
        run: |
          npx prisma migrate deploy
          npm run db:seed

      # Chromium is ~150 MB and was re-downloaded on every single browser run. The install step below
      # stays exactly as it was — with the cache warm it finds the binary already there and becomes a
      # fast no-op, and `--with-deps` still installs the OS libraries, which are not cached. The key
      # is the lockfile, so bumping Playwright's version invalidates it automatically.
      - name: Cache the Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # `=all` matters. Plain `--update-snapshots` defaults to "changed": it only rewrites a baseline
      # whose comparison FAILED, so any real change that happens to fall inside the tolerance is
      # neither reported nor re-baselined — the old picture survives, and it is now a picture of the
      # previous behaviour. That is how N1's rewritten macro row ended up passing on the desktop shot
      # while the phone shot caught it. "all" rewrites every baseline from what the page actually
      # renders, which is the only thing a baseline is supposed to be.
      - name: Generate the baselines
        run: npx playwright test vrt.spec.ts --update-snapshots=all

      - name: Upload them for the developer to commit
        uses: actions/upload-artifact@v4
        with:
          name: vrt-baselines
          path: app/e2e/vrt.spec.ts-snapshots/
          retention-days: 14
