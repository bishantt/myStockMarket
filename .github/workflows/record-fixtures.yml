# record-fixtures.yml — TEMPORARY. Records real P2 provider responses as test fixtures, then this
# workflow is deleted (per the new-provider-adapter skill). Provider keys live only in GitHub
# secrets, so recording must happen here. Output is uploaded as an artifact to download and commit.
name: record-fixtures
on:
  workflow_dispatch: {}
jobs:
  record:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Record fixtures
        env:
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
        run: |
          uv run python scripts/record_finnhub.py
          uv run python scripts/record_fmp.py
          uv run python scripts/record_marketaux.py
          uv run python scripts/record_edgar.py
          uv run python scripts/record_fred_calendar.py
      - name: Upload fixtures
        uses: actions/upload-artifact@v4
        with:
          name: recorded-fixtures
          path: recorded/
