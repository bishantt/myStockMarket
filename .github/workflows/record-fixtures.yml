# record-fixtures.yml — the fixture recorder. STANDING, not temporary.
#
# Provider keys live in GitHub's secrets and nowhere else, so a real recorded fixture for a keyed
# provider can only be taken from inside Actions (the new-provider-adapter skill's step 1). Run it
# with `gh workflow run record-fixtures.yml`, then `gh run download` and commit what it captured.
#
# It is checked in rather than deleted after use (a deliberate amendment to the skill, which was
# written when this was a one-off): N4 needs it for the news adapters' extended fields, and gold's
# real success fixture cannot be recorded until P-5 lands. Adding a KEYED provider means adding a
# step here — the key lives only in secrets, so its fixture can only be recorded from Actions. A
# KEYLESS provider records from the laptop instead (the skill's rule), which is why record_erapi.py
# and record_nrb.py have no step: neither reads a key. That is the whole maintenance cost, and it is
# cheaper than the alternative this repo has already paid for once: three FRED fixtures that were
# hand-written to LOOK recorded, and spent three phases proving the parser agreed with an imagination.
#
# Recording GoldAPI is attempted deliberately even though its key (P-5) is absent: the unkeyed 403
# is itself a real, useful recording — it pins the route and the auth header — and the run says so
# in its log rather than passing over the gap in silence.

name: record-fixtures

on:
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Record FRED (the board series + the Mood gauge's trailing history)
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_fred.py

      - name: Record GoldAPI (the key landed 2026-07-13; before that this captured the real 403)
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_goldapi.py

      # N4's Front Page reads MARKET-WIDE news, which is a different Finnhub endpoint from the
      # company news this repo already had recorded, and a different question asked of Marketaux.
      # An endpoint nobody has called is an endpoint nobody has seen.
      - name: Record the news providers (the market-wide feeds N4's Front Page ingests)
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_news.py

      - name: Record Alpaca (the daily bars + asset universe the P1 adapter reads)
        env:
          ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_alpaca.py

      - name: Record SEC EDGAR (the submissions envelope the filings adapter parses)
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_edgar.py

      - name: Record Finnhub (company news + the basic financial-metrics endpoint)
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_finnhub.py

      - name: Record FMP (the earnings-calendar responses the P2 adapter reads)
        env:
          FMP_KEY: ${{ secrets.FMP_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_fmp.py

      - name: Record the FRED release calendar (P2's CalendarTimeline dates)
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_fred_calendar.py

      - name: Record Marketaux (a small multi-symbol news pull)
        env:
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_marketaux.py

      - name: Upload the recordings
        uses: actions/upload-artifact@v4
        with:
          name: fixtures
          path: recorded/
          if-no-files-found: error
