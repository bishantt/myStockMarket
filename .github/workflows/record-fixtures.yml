# record-fixtures.yml — the fixture recorder. STANDING, not temporary.
#
# Provider keys live in GitHub's secrets and nowhere else, so a real recorded fixture for a keyed
# provider can only be taken from inside Actions (the new-provider-adapter skill's step 1). Run it
# with `gh workflow run record-fixtures.yml`, then `gh run download` and commit what it captured.
#
# It is checked in rather than deleted after use (a deliberate amendment to the skill, which was
# written when this was a one-off): N4 needs it for the news adapters' extended fields, and gold's
# real success fixture cannot be recorded until P-5 lands. Adding a provider means adding a step
# here — that is the whole maintenance cost, and it is cheaper than the alternative, which this repo
# has already paid for once: three FRED fixtures that were hand-written to LOOK recorded, and spent
# three phases proving that the parser agreed with someone's imagination.
#
# Recording GoldAPI is attempted deliberately even though its key (P-5) is absent: the unkeyed 403
# is itself a real, useful recording — it pins the route and the auth header — and the run says so
# in its log rather than passing over the gap in silence.

name: record-fixtures

on:
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Record FRED (the board series + the Mood gauge's trailing history)
        env:
          FRED_KEY: ${{ secrets.FRED_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_fred.py

      - name: Record GoldAPI (records the real unkeyed 403 when P-5 is absent)
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          MSM_FIXTURES_OUT: ${{ github.workspace }}/recorded
        run: uv run python scripts/record_goldapi.py

      - name: Upload the recordings
        uses: actions/upload-artifact@v4
        with:
          name: fixtures
          path: recorded/
          if-no-files-found: error
