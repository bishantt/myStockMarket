<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="myStockMarket">
  <!--
    The house mark (D3): a rounded tile carrying the brand gradient, with a white mono "M".

    This is one of exactly TWO places in the product allowed to use the brand gradient — the other
    is the primary button. A gradient used twice is a signature; a gradient used everywhere is a
    template, and this design would rather be neither.

    The gradient stops are the literal values of —gradient-brand in globals.css and must stay in
    lockstep with it. An SVG cannot read a CSS custom property when it is rasterised by sharp at
    build time, so they are written out here — this file, globals.css, lib/tokens.ts and
    scripts/icons.mjs are the only places a brand hex may appear.

    The glyph-only version (for Android's monochrome themed icon, which must be a single colour on
    a transparent field) lives beside this one in mark-glyph.svg.
  -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
  </defs>

  <rect width="96" height="96" rx="22" fill="url(#brand)" />

  <!-- The M, drawn rather than typeset: a font would have to be embedded to rasterise reliably. -->
  <path
    d="M24 70V26h9.5l14.5 24 14.5-24H72v44h-9.5V43L48 66.5 33.5 43v27z"
    fill="#ffffff"
  />
</svg>
